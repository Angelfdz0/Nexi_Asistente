<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanso — Social Media Expert</title>
    <!-- Fuente elegante y minimalista -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Enlace al archivo CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <!-- Encabezado con estética Japandi -->
        <div class="chat-header">
            <div class="avatar">K</div>
            <div class="header-info">
                <h2>Kanso</h2>
                <p>Estratega & Gestor de Redes Sociales</p>
            </div>
            <div class="status-indicator"></div>
        </div>

        <!-- Contenedor dinámico de mensajes -->
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                Hola. Soy Kanso, tu consultor estratégico de redes sociales. 
                
                ¿Qué canal, campaña o estrategia de contenido optimizaremos hoy para potenciar tu marca?
            </div>
        </div>

        <!-- Área de interacción/Entrada de texto -->
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Pregúntame sobre copys, calendarios, hashtags o crisis..." autocomplete="off">
            <button id="sendBtn" aria-label="Enviar mensaje">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <!-- Enlace al archivo JavaScript (Definido como módulo para soporte SDK moderno) -->
    <script type="module" src="script.js"></script>
</body>
</html>
