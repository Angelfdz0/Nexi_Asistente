<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Virtual - Japandi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F9F6F0;       
            --panel-color: #FFFFFF;
            --text-main: #2C2C2C;       
            --text-muted: #7A7A7A;
            --accent: #7A8475;         
            --border-color: #E6DFD3;   
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
        }

        .chat-container {
            width: 100%;
            max-width: 420px;
            height: 90vh;
            background: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.02);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header .avatar {
            width: 36px;
            height: 36px;
            background-color: var(--accent);
            border-radius: 50%;
        }

        .chat-header h2 {
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .chat-header p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-color: #FAF9F5; 
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            font-size: 0.9rem;
            line-height: 1.5;
            border-radius: 12px;
            animation: fadeIn 0.3s ease;
        }

        .message.bot {
            background-color: var(--panel-color);
            color: var(--text-main);
            align-self: flex-start;
            border: 1px solid var(--border-color);
            border-top-left-radius: 2px;
        }

        .message.user {
            background-color: var(--accent);
            color: #FFFFFF;
            align-self: flex-end;
            border-top-right-radius: 2px;
        }

        .chat-input-area {
            padding: 16px;
            background: var(--panel-color);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            padding: 12px 16px;
            border-radius: 8px;
            outline: none;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .chat-input-area input:focus {
            border-color: var(--accent);
        }

        .chat-input-area button {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            padding: 0 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar"></div>
            <div>
                <h2>Kanso</h2>
                <p>Asistente de Redes Sociales</p>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                Hola. Soy Kanso. ¿En qué puedo ayudarte hoy con la gestión de tus redes?
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Escribe un mensaje aquí..." autocomplete="off">
            <button id="sendBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const GEMINI_API_KEY = "AQ.Ab8RN6Ikh7JBT-eaB70LCpOYSdP3FAfAKeR0EzGQSppSomCDgQ"; 
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });

        function sendMessage() {
            const input = document.getElementById('userInput');
            const messageText = input.value.trim();
            
            if (messageText === '') return;

            appendMessage(messageText, 'user');
            input.value = '';

            const typingId = appendMessage("Kanso está pensando...", 'bot');

            // Intento de conexión usando XMLHttpRequest tradicional en lugar de fetch para buscar mayor compatibilidad en local
            const xhr = new XMLHttpRequest();
            xhr.open("POST", API_URL, true);
            xhr.setRequestHeader("Content-Type", "application/json");

            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    const typingElement = document.getElementById(typingId);
                    if (typingElement) typingElement.remove();

                    if (xhr.status === 200) {
                        try {
                            const data = JSON.parse(xhr.responseText);
                            if (data.candidates && data.candidates[0].content.parts[0].text) {
                                const botResponse = data.candidates[0].content.parts[0].text;
                                appendMessage(botResponse, 'bot');
                            } else {
                                appendMessage("No se obtuvo un formato de respuesta esperado.", 'bot');
                            }
                        } catch (e) {
                            appendMessage("Error al procesar la respuesta del servidor.", 'bot');
                        }
                    } else {
                        appendMessage(`Restricción de Android detectada. Para que funcione la IA en tu celular, este archivo debe subirse a internet (ej. GitHub Pages de forma gratuita).`, 'bot');
                    }
                }
            };

            const payload = JSON.stringify({
                contents: [{
                    parts: [{
                        text: `Actúa como Kanso, un asistente de redes sociales Japandi. Ayuda brevemente al usuario con: "${messageText}"`
                    }]
                }]
            });

            try {
                xhr.send(payload);
            } catch (err) {
                const typingElement = document.getElementById(typingId);
                if (typingElement) typingElement.remove();
                appendMessage("El sistema operativo bloqueó la salida de datos.", 'bot');
            }
        }

        function appendMessage(text, sender) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            const uniqueId = 'msg-' + Math.random().toString(36).substr(2, 9); 
            
            messageDiv.id = uniqueId;
            messageDiv.classList.add('message', sender);
            messageDiv.innerText = text;
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return uniqueId;
        }
    </script>
</body>
</html>
